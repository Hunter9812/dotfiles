patch:
  #= Options
  app_options:
  show_notifications: false

  #= Appearance
  style/font_face: "霞鹜文楷"
  style/label_font_face: "霞鹜文楷"
  style/comment_font_face: "霞鹜文楷"
  style/font_point: 12
  style/label_font_point: 12
  style/comment_font_point: 12
  style/inline_preedit: false
  style/layout/border_width: 1
  style/layout/margin_x: 8
  style/layout/margin_y: 8
  style/layout/spacing: 13
  style/layout/candidate_spacing: 22
  style/layout/hilite_spacing: 6
  style/layout/hilite_padding: 4

  #== Skin
  style/horizontal: true
  style/color_scheme: ink
  preset_color_schemes:
    ink:
      name: 墨池／Ink
      author: 佛振 <chen.sst@gmail.com>
      text_color: 0
      back_color: 16777215
      border_color: 0
      label_color: 5592405
      hilited_text_color: 0
      hilited_back_color: 14540253
      candidate_text_color: 0
      comment_text_color: 5592405
      hilited_candidate_text_color: 16777215
      hilited_comment_text_color: 5592405
      hilited_candidate_back_color: 0
      hilited_label_color: 11184810
